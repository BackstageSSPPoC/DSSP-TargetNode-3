apiVersion: backstage.io/v1alpha1
kind: Component

metadata:
  name: DSSP-TargetNode-3
  description: Service DSSP-TargetNode-3

  annotations:
    github.com/project-slug: BackstageSSPPoC/DSSP-TargetNode-3
    backstage.io/techdocs-ref: dir:.
    jenkins.io/job-full-name: Backstage_SSP_PoC/DSSP-TargetNode-3/main
    argocd/app-name: dssp-targetnode-3-prod
    backstage.io/kubernetes-id: DSSP-TargetNode-3
    sonarqube.org/project-key: dssp-targetnode-3
    prometheus.io/rule: "kube_pod_container_resource_requests{pod=~'dssp-targetnode-3.*'}|resource,kube_pod_container_status_restarts_total{pod=~'dssp-targetnode-3.*'}|container"
    prometheus.io/alert: "all"

spec:
  type: service
  owner: development
  lifecycle: experimental

